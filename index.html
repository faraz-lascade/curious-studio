<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Curious Object</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white">

  <!-- Header -->
  <header class="border-b border-gray-800">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
      <h1 class="text-xl font-semibold tracking-wide">Curious Object</h1>
      <nav class="space-x-6 text-sm">
        <a href="#about" class="hover:text-purple-400">About</a>

        <a href="#contact" class="hover:text-purple-400">Contact</a>
      </nav>
    </div>
  </header>

  <!-- Hero -->
  <section class="relative py-24 text-center overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-br from-purple-700/30 via-pink-600/20 to-blue-600/20 blur-3xl"></div>
    <div class="relative max-w-3xl mx-auto px-6">
      <h2 class="text-5xl font-bold mb-6 leading-tight">Apps That Spark Curiosity</h2>
      <p class="text-gray-300 mb-8">We build subscription-driven mobile experiences designed to engage, explore, and evolve.</p>
    </div>
  </section>
  <!-- Contact -->
  <section class="text-center py-20">
    <h3 class="text-3xl font-semibold mb-4">Let’s Build Something Interesting</h3>
    <p class="text-gray-400 mb-6">Reach out for collaborations or inquiries.</p>
    <a href="mailto:hello@curiousobject.com" class="text-purple-400 hover:underline">hello@curiousobject.com</a>
  </section>

  <!-- Footer -->
  <footer class="border-t border-gray-800 mt-10">
    <div class="max-w-6xl mx-auto px-6 py-6 text-center text-gray-500 text-sm">
      © 2026 Curious Object. All rights reserved.
    </div>
  </footer>

</body>
</html>
