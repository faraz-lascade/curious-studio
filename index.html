<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Curious Object</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-white via-slate-50 to-indigo-50 text-gray-900">

  <!-- Header -->
  <header class="border-b border-gray-200 bg-white/70 backdrop-blur">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
      <h1 class="text-xl font-semibold tracking-wide text-gray-900">Curious Object</h1>
      <nav class="space-x-6 text-sm text-gray-600">
        <a href="#about" class="hover:text-indigo-600 transition">About</a>
        <a href="#contact" class="hover:text-indigo-600 transition">Contact</a>
      </nav>
    </div>
  </header>

  <!-- Hero -->
  <section class="relative py-24 text-center overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-br from-indigo-200/40 via-purple-200/30 to-cyan-200/30 blur-3xl"></div>
    <div class="relative max-w-3xl mx-auto px-6">
      <h2 class="text-5xl font-bold mb-6 leading-tight">
        <span class="bg-gradient-to-r from-indigo-600 via-purple-600 to-cyan-600 text-transparent bg-clip-text">
          Apps That Spark Curiosity
        </span>
      </h2>
      <p class="text-gray-600 mb-8">
        We build subscription-driven mobile experiences designed to engage, explore, and evolve.
      </p>
    </div>
  </section>

  <!-- Contact -->
  <section class="text-center py-20">
    <h3 class="text-3xl font-semibold mb-4 text-gray-900">Let’s Build Something Interesting</h3>
    <p class="text-gray-600 mb-6">Reach out for collaborations or inquiries.</p>
    <a href="mailto:hello@curiousobject.com" class="text-indigo-600 hover:text-indigo-500 transition underline-offset-4 hover:underline">
      hello@curiousobject.com
    </a>
  </section>

  <!-- Footer -->
  <footer class="border-t border-gray-200 mt-10 bg-white/60">
    <div class="max-w-6xl mx-auto px-6 py-6 text-center text-gray-500 text-sm">
      © 2026 Curious Object. All rights reserved.
    </div>
  </footer>

</body>
</html>
